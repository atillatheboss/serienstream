<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SerienStream Suche</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6fe0;
    --accent2: #5dcaa5;
    --text: #f0eeff;
    --muted: #888;
    --danger: #e24b4a;
    --warn: #ef9f27;
    --radius: 10px;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent2); }

  .search-bar {
    flex: 1;
    display: flex;
    gap: 8px;
    max-width: 600px;
    margin-left: auto;
  }

  .search-bar input {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-bar input:focus { border-color: var(--accent); }

  .search-bar select {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    color: var(--muted);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 8px 18px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sm {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn-ghost {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

  .proxy-hint {
    background: var(--surface);
    border: 0.5px solid rgba(239,159,39,0.4);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }
  .proxy-hint strong { color: var(--warn); }
  .proxy-hint a { color: var(--accent); text-decoration: none; }
  .proxy-hint a:hover { text-decoration: underline; }

  #status {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1rem;
    min-height: 20px;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }

  .series-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .series-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .series-card.active { border-color: var(--accent2); }

  .card-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }
  .card-cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: var(--border);
  }

  .card-body { padding: 10px; }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta { font-size: 11px; color: var(--muted); }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    margin-right: 4px;
  }
  .badge-anime { background: rgba(124,111,224,0.2); color: var(--accent); }
  .badge-series { background: rgba(93,202,165,0.2); color: var(--accent2); }

  .detail-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 2rem;
  }

  .detail-header {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .detail-cover {
    width: 100px;
    min-width: 100px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 6px;
    background: var(--surface2);
  }
  .detail-info h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .detail-info p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 8px;
    flex-wrap: wrap;
  }
  .tab {
    background: transparent;
    border: 0.5px solid transparent;
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--accent); border-color: var(--accent); background: rgba(124,111,224,0.1); }

  .episode-list { display: flex; flex-direction: column; gap: 6px; }

  .episode-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .episode-item:hover { border-color: var(--accent); }
  .episode-item.active { border-color: var(--accent2); background: rgba(93,202,165,0.05); }

  .ep-num {
    font-size: 12px;
    color: var(--muted);
    min-width: 32px;
    font-variant-numeric: tabular-nums;
  }
  .ep-title { font-size: 13px; flex: 1; }

  .stream-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .stream-panel h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }

  .stream-list { display: flex; flex-direction: column; gap: 8px; }

  .stream-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .hoster-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    min-width: 70px;
    text-align: center;
  }
  .hoster-voe { background: rgba(124,111,224,0.2); color: #afa9ec; }
  .hoster-streamtape { background: rgba(226,75,74,0.2); color: #f09595; }
  .hoster-doodstream { background: rgba(239,159,39,0.2); color: #fac775; }
  .hoster-vidoza { background: rgba(93,202,165,0.2); color: var(--accent2); }
  .hoster-default { background: rgba(136,135,128,0.2); color: var(--muted); }

  .lang-badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .stream-url {
    flex: 1;
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
  }

  .copy-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 4px 9px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent2); color: var(--accent2); }

  .open-btn {
    background: transparent;
    border: 0.5px solid rgba(93,202,165,0.3);
    border-radius: 5px;
    padding: 4px 9px;
    color: var(--accent2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
    text-decoration: none;
    white-space: nowrap;
  }
  .open-btn:hover { background: rgba(93,202,165,0.1); }

  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 14px; }

  .proxy-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
  }
  .proxy-input-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .proxy-input-row input {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    font-family: monospace;
  }

  @media (max-width: 600px) {
    header { flex-wrap: wrap; }
    .search-bar { min-width: 100%; order: 3; }
    main { padding: 1rem; }
    .detail-header { flex-direction: column; }
    .detail-cover { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Serien<span>Stream</span></div>
  <div class="search-bar">
    <select id="siteSelect">
      <option value="serie">s.to (Serien)</option>
      <option value="anime">AniWorld</option>
    </select>
    <input type="text" id="searchInput" placeholder="Serie suchen..." autocomplete="off" />
    <button class="btn" onclick="search()">Suchen</button>
  </div>
</header>

<main>
  <div class="proxy-hint" id="proxyHint" style="display:none">
    <strong>&#9888; Proxy-Info:</strong>
    Der eingebaute Proxy leitet Anfragen nur an <strong>s.to</strong> und <strong>aniworld.to</strong> weiter.
    Die extrahierten Stream-URLs kannst du direkt in <strong>VLC</strong>, <strong>mpv</strong> oder deinen Browser öffnen.
  </div>

  <div class="proxy-input-row" style="display:none">
    <label>Proxy-URL:</label>
    <input type="text" id="proxyUrl" value="/proxy?url=" placeholder="z.B. /proxy?url= oder https://corsproxy.io/?" />
  </div>

  <div id="status"></div>
  <div id="searchResults"></div>
  <div id="detailPanel"></div>
  <div id="streamPanel"></div>
</main>

<script>
const HOSTS = {
  serie: 'https://s.to',
  anime: 'https://aniworld.to'
};

function getProxy() {
  const el = document.getElementById('proxyUrl');
  return el ? el.value.trim() : '/proxy?url=';
}

function getSite() {
  return document.getElementById('siteSelect').value;
}

function proxyUrl(url) {
  const p = getProxy() || '/proxy?url=';
  return p + encodeURIComponent(url);
}

function setStatus(msg, loading = false) {
  const s = document.getElementById('status');
  s.innerHTML = loading ? `<span class="spinner"></span>${msg}` : msg;
}

async function fetchHtml(url) {
  const resp = await fetch(proxyUrl(url));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const parser = new DOMParser();
  return parser.parseFromString(text, 'text/html');
}

async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const site = getSite();
  const base = HOSTS[site];
  const url = `${base}/ajax/search`;

  setStatus('Suche läuft...', true);
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('detailPanel').innerHTML = '';
  document.getElementById('streamPanel').innerHTML = '';

  try {
    const resp = await fetch(proxyUrl(url), {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `keyword=${encodeURIComponent(q)}`
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    renderSearchResults(doc, base, site);
  } catch(e) {
    setStatus(`<span style="color:var(--danger)">Fehler: ${e.message} – Proxy erreichbar?</span>`);
  }
}

function renderSearchResults(doc, base, site) {
  const items = doc.querySelectorAll('li a');
  const results = [];

  items.forEach(a => {
    const href = a.getAttribute('href') || '';
    if (!href.includes(`/${site}/stream/`)) return;
    const img = a.querySelector('img');
    const nameEl = a.querySelector('span:not(.genre)');
    const genreEl = a.querySelector('.genre');
    results.push({
      href,
      title: nameEl ? nameEl.textContent.trim() : href.split('/').pop(),
      genre: genreEl ? genreEl.textContent.trim() : '',
      cover: img ? (img.getAttribute('data-src') || img.src) : null
    });
  });

  if (!results.length) {
    setStatus('Keine Ergebnisse gefunden.');
    document.getElementById('searchResults').innerHTML = `<div class="empty">Keine Treffer für diese Suche.</div>`;
    return;
  }

  setStatus(`${results.length} Ergebnis${results.length !== 1 ? 'se' : ''} gefunden.`);

  const grid = document.createElement('div');
  grid.className = 'results-grid';

  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'series-card';
    card.id = `card-${i}`;
    const coverHtml = r.cover
      ? `<img class="card-cover" src="${proxyUrl(base + r.cover)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><div class="card-cover-placeholder" style="display:none">&#127916;</div>`
      : `<div class="card-cover-placeholder">&#127916;</div>`;
    card.innerHTML = `
      ${coverHtml}
      <div class="card-body">
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${r.genre ? `<span class="badge ${site === 'anime' ? 'badge-anime' : 'badge-series'}">${r.genre}</span>` : ''}</div>
      </div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.series-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      loadSeries(base + r.href, r.title, r.cover ? base + r.cover : null, site);
    };
    grid.appendChild(card);
  });

  document.getElementById('searchResults').appendChild(grid);
}

let currentSeries = null;

async function loadSeries(url, title, cover, site) {
  setStatus('Lade Serieninfos...', true);
  document.getElementById('detailPanel').innerHTML = '';
  document.getElementById('streamPanel').innerHTML = '';

  try {
    const doc = await fetchHtml(url);
    const desc = doc.querySelector('.seri_des .seri-des') || doc.querySelector('[itemprop="description"]');
    const description = desc ? desc.textContent.trim().slice(0, 300) + (desc.textContent.length > 300 ? '...' : '') : '';

    // Find seasons
    const seasonLinks = doc.querySelectorAll('#stream ul:first-child li a');
    const seasons = [];
    seasonLinks.forEach(a => {
      const href = a.getAttribute('href');
      const text = a.textContent.trim();
      if (href && (text.match(/^Staffel\s*\d+/i) || text.match(/^Season\s*\d+/i))) {
        seasons.push({ label: text, href });
      }
    });

    const hasMovies = Array.from(doc.querySelectorAll('#stream ul:first-child li a')).some(a =>
      a.textContent.toLowerCase().includes('film') || a.textContent.toLowerCase().includes('movie')
    );

    currentSeries = { url, title, cover, site, seasons, hasMovies };
    renderDetailPanel(description);
    if (seasons.length > 0) {
      loadSeason(seasons[0].href, 0);
    }
    setStatus('');
  } catch(e) {
    setStatus(`<span style="color:var(--danger)">Fehler beim Laden: ${e.message}</span>`);
  }
}

function renderDetailPanel(description) {
  const { title, cover, site, seasons, hasMovies } = currentSeries;
  const base = HOSTS[site];

  const panel = document.getElementById('detailPanel');
  const coverHtml = cover
    ? `<img class="detail-cover" src="${proxyUrl(cover)}" onerror="this.style.display='none'">`
    : `<div class="detail-cover" style="display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--surface2)">&#127916;</div>`;

  let tabsHtml = seasons.map((s, i) =>
    `<button class="tab ${i===0?'active':''}" onclick="selectTab(${i}, this)" data-season="${i}">${s.label}</button>`
  ).join('');
  if (hasMovies) tabsHtml += `<button class="tab" onclick="loadMovies(this)">Filme</button>`;

  panel.innerHTML = `
    <div class="detail-header">
      ${coverHtml}
      <div class="detail-info">
        <h2>${title}</h2>
        <p>${description || 'Keine Beschreibung verfügbar.'}</p>
      </div>
    </div>
    <div class="tabs" id="seasonTabs">${tabsHtml}</div>
    <div class="episode-list" id="episodeList"><div class="empty">Episoden werden geladen...</div></div>
  `;
}

function selectTab(idx, btn) {
  document.querySelectorAll('#seasonTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadSeason(currentSeries.seasons[idx].href, idx);
  document.getElementById('streamPanel').innerHTML = '';
}

async function loadSeason(href, idx) {
  const base = HOSTS[currentSeries.site];
  const url = base + href;
  setStatus('Lade Episoden...', true);

  try {
    const doc = await fetchHtml(url);
    const rows = doc.querySelectorAll('table.seasonEpisodesList tbody tr');
    const episodes = [];
    rows.forEach(tr => {
      const numEl = tr.querySelector('.episodeNumSpan') || tr.querySelector('td:first-child');
      const titleEl = tr.querySelector('.seasonEpisodeTitle strong') || tr.querySelector('td.seasonEpisodeTitle a');
      const epLink = tr.querySelector('a[href]');
      if (!epLink) return;
      episodes.push({
        num: numEl ? numEl.textContent.trim() : '?',
        title: titleEl ? titleEl.textContent.trim() : epLink.textContent.trim(),
        href: epLink.getAttribute('href')
      });
    });

    if (!episodes.length) {
      document.getElementById('episodeList').innerHTML = `<div class="empty">Keine Episoden gefunden.</div>`;
      setStatus('');
      return;
    }

    const list = document.getElementById('episodeList');
    list.innerHTML = '';
    episodes.forEach((ep, i) => {
      const item = document.createElement('div');
      item.className = 'episode-item';
      item.id = `ep-${i}`;
      item.innerHTML = `
        <span class="ep-num">E${ep.num}</span>
        <span class="ep-title">${ep.title || 'Episode ' + ep.num}</span>
        <span style="font-size:11px;color:var(--muted)">&#9654;</span>
      `;
      item.onclick = () => {
        document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
        item.classList.add('active');
        loadEpisodeStreams(base + ep.href, ep.title || 'Episode ' + ep.num);
      };
      list.appendChild(item);
    });

    setStatus(`${episodes.length} Episode${episodes.length !== 1 ? 'n' : ''} geladen.`);
  } catch(e) {
    setStatus(`<span style="color:var(--danger)">Fehler: ${e.message}</span>`);
  }
}

async function loadMovies(btn) {
  document.querySelectorAll('#seasonTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('streamPanel').innerHTML = '';
  const base = HOSTS[currentSeries.site];
  const movieUrl = currentSeries.url + '/filme';
  setStatus('Lade Filme...', true);

  try {
    const doc = await fetchHtml(movieUrl);
    const links = doc.querySelectorAll('a[href*="/filme/film"]');
    const list = document.getElementById('episodeList');
    list.innerHTML = '';
    if (!links.length) {
      list.innerHTML = `<div class="empty">Keine Filme gefunden.</div>`;
      setStatus('');
      return;
    }
    links.forEach((a, i) => {
      const item = document.createElement('div');
      item.className = 'episode-item';
      item.innerHTML = `
        <span class="ep-num">F${i+1}</span>
        <span class="ep-title">${a.textContent.trim() || 'Film ' + (i+1)}</span>
        <span style="font-size:11px;color:var(--muted)">&#9654;</span>
      `;
      item.onclick = () => {
        document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
        item.classList.add('active');
        loadEpisodeStreams(base + a.getAttribute('href'), a.textContent.trim());
      };
      list.appendChild(item);
    });
    setStatus(`${links.length} Film${links.length !== 1 ? 'e' : ''} gefunden.`);
  } catch(e) {
    setStatus(`<span style="color:var(--danger)">Fehler: ${e.message}</span>`);
  }
}

async function loadEpisodeStreams(url, episodeTitle) {
  setStatus('Lade Stream-Links...', true);
  document.getElementById('streamPanel').innerHTML = '';

  try {
    const doc = await fetchHtml(url);

    // Extract all hoster entries from the episode page
    const hosters = [];

    // Method 1: .hosterSiteVideo list
    const hostLinks = doc.querySelectorAll('.hosterSiteVideo ul li');
    hostLinks.forEach(li => {
      const a = li.querySelector('a');
      const hosterName = li.querySelector('h4') || li.querySelector('.buttonText');
      const langEl = li.querySelector('.icon-flag') || li;

      if (!a) return;
      const href = a.getAttribute('href') || a.getAttribute('data-link-target') || '';
      const langClass = li.className || '';
      const lang = detectLang(langClass, li.textContent);

      hosters.push({
        hoster: hosterName ? hosterName.textContent.trim() : detectHoster(href),
        href: href.startsWith('http') ? href : (HOSTS[currentSeries.site] + href),
        lang
      });
    });

    // Method 2: data-link-target attributes
    if (!hosters.length) {
      doc.querySelectorAll('[data-link-target]').forEach(el => {
        const href = el.getAttribute('data-link-target');
        const langClass = el.closest('li')?.className || el.className || '';
        hosters.push({
          hoster: detectHoster(href),
          href: href.startsWith('http') ? href : (HOSTS[currentSeries.site] + href),
          lang: detectLang(langClass, el.textContent)
        });
      });
    }

    // Method 3: redirect links
    if (!hosters.length) {
      doc.querySelectorAll('a[href*="/redirect/"]').forEach(a => {
        const href = a.getAttribute('href');
        const li = a.closest('li');
        const langClass = li?.className || '';
        hosters.push({
          hoster: detectHoster(href),
          href: HOSTS[currentSeries.site] + href,
          lang: detectLang(langClass, a.textContent)
        });
      });
    }

    renderStreamPanel(episodeTitle, hosters, url);
    setStatus('');
  } catch(e) {
    setStatus(`<span style="color:var(--danger)">Fehler beim Laden der Streams: ${e.message}</span>`);
  }
}

function detectHoster(href) {
  if (!href) return 'Unbekannt';
  const h = href.toLowerCase();
  if (h.includes('voe')) return 'VOE';
  if (h.includes('streamtape')) return 'Streamtape';
  if (h.includes('dood')) return 'Doodstream';
  if (h.includes('vidoza')) return 'Vidoza';
  if (h.includes('filemoon') || h.includes('moon')) return 'Filemoon';
  if (h.includes('upstream')) return 'Upstream';
  if (h.includes('speedfiles') || h.includes('speed')) return 'Speedfiles';
  try { return new URL(href).hostname.replace('www.', ''); } catch { return 'Hoster'; }
}

function detectLang(cls, text) {
  const c = (cls + ' ' + text).toLowerCase();
  if (c.includes('german') || c.includes('deutsch') || c.includes('de-') || c.includes('_de')) return '🇩🇪 Deutsch';
  if (c.includes('english') || c.includes('englisch') || c.includes('en-') || c.includes('_en')) return '🇬🇧 Englisch';
  if (c.includes('sub') || c.includes('untertitel')) return '💬 Sub';
  if (c.includes('dub')) return '🎙 Dub';
  return '';
}

function hosterClass(hoster) {
  const h = hoster.toLowerCase();
  if (h.includes('voe')) return 'hoster-voe';
  if (h.includes('streamtape')) return 'hoster-streamtape';
  if (h.includes('dood')) return 'hoster-doodstream';
  if (h.includes('vidoza')) return 'hoster-vidoza';
  return 'hoster-default';
}

function renderStreamPanel(title, hosters, pageUrl) {
  const panel = document.getElementById('streamPanel');

  if (!hosters.length) {
    panel.innerHTML = `
      <div class="stream-panel">
        <h3>&#127916; ${title}</h3>
        <div class="empty">Keine Stream-Links gefunden. Versuche die Seite direkt zu öffnen.</div>
        <div style="margin-top:1rem">
          <a class="open-btn" href="${pageUrl}" target="_blank">Direkt öffnen &#8599;</a>
        </div>
      </div>
    `;
    return;
  }

  panel.innerHTML = `
    <div class="stream-panel">
      <h3>&#127916; ${title} <span style="font-size:12px;color:var(--muted);font-weight:400">${hosters.length} Streams</span></h3>
      <div class="stream-list" id="streamList"></div>
    </div>
  `;

  const list = document.getElementById('streamList');
  hosters.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'stream-item';
    item.innerHTML = `
      <span class="hoster-badge ${hosterClass(h.hoster)}">${h.hoster}</span>
      ${h.lang ? `<span class="lang-badge">${h.lang}</span>` : ''}
      <span class="stream-url" title="${h.href}">${h.href}</span>
      <button class="copy-btn" id="copy-${i}" onclick="copyUrl('${h.href}', ${i})">Kopieren</button>
      <a class="open-btn" href="${h.href}" target="_blank">Öffnen &#8599;</a>
    `;
    list.appendChild(item);
  });

  // Scroll to stream panel
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyUrl(url, idx) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById(`copy-${idx}`);
    btn.textContent = 'Kopiert!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopieren'; btn.classList.remove('copied'); }, 2000);
  });
}

// Allow Enter key in search
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
